<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- GitHub Pages favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/WorkoutTrackerIOS/favicon.svg"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Workout Tracker</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/WorkoutTrackerIOS/manifest.webmanifest" />

    <!-- Theme color (affects iOS status bar + Android UI) -->
    <meta name="theme-color" content="#0e0e0f" />

    <!-- iOS standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Workouts" />

    <!-- iOS home screen icon -->
    <link rel="apple-touch-icon" href="/WorkoutTrackerIOS/icon-192.png" />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
